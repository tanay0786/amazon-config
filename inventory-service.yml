server:
  port: 8086

spring:
  application:
    name: inventory-service

  cloud:
    function:
      definition: orderCreatedConsumer

    stream:
      bindings:
        orderCreatedConsumer-in-0:
          destination: order-created
          group: inventory-service-group

      kafka:
        binder:
          brokers: localhost:9092

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: "*"
